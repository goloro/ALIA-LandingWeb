<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIA - Prototipo</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Global CSS -->
    <link rel="stylesheet" href="../CSS/LandingPage/global.css">
    <link rel="stylesheet" href="../CSS/LandingPage/header.css">
    
    <!-- Prototype CSS -->
    <link rel="stylesheet" href="../CSS/Prototipo/prototipo.css">
    <link rel="stylesheet" href="../CSS/Responsive/Prototipo/prototipo-responsive.css">
</head>

<body>
    <!-- Mobile Blocker Screen -->
    <div class="mobile-blocker">
        <div class="blocker-content">
            <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="blocker-icon">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            <h2>Experiencia de Escritorio</h2>
            <p>El prototipo interactivo de ALIA está diseñado exclusivamente para ordenadores. Por favor, accede desde tu ordenador para visualizar el panel de control completo.</p>
            <a href="../index.html" class="btn btn-primary">Volver a la portada</a>
        </div>
    </div>

    <!-- Main Desktop App Content -->
    <div class="app-container">
        <!-- Header -->
        <header class="header" style="border-bottom: 1px solid #e5e7eb;">
            <div class="logo-container">
                <a href="../index.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
                    <img src="../Images/Logos/LogoHexagonoAlia-SinFondo.png" alt="ALIA Logo" class="logo-img">
                    <img src="../Images/Logos/LogoTextoAlia-SinFondo.png" alt="Texto ALIA Logo" class="logo-img">
                </a>
            </div>
            <a href="../index.html" class="btn btn-secondary" style="border: 1px solid #e5e7eb;">Volver al Inicio</a>
        </header>

        <main class="prototype-workspace">
            <div class="workspace-placeholder">
                <div class="spinner"></div>
                <h2>Cargando entorno del prototipo...</h2>
                <p>Próximamente disponible.</p>
            </div>
        </main>
    </div>
</body>
</html>
