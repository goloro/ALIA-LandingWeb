<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIA - El asistente que optimiza tus reservas</title>
    
    <link rel="shortcut icon" href="Images/Logos/LogoHexagonoAlia-SinFondo.png" type="image/x-icon">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS (Modulos) -->
    <link rel="stylesheet" href="CSS/global.css">
    <link rel="stylesheet" href="CSS/header.css">
    <link rel="stylesheet" href="CSS/hero.css">
    <link rel="stylesheet" href="CSS/phone-mockup.css">
    <link rel="stylesheet" href="CSS/chat.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo-container">
            <!-- El usuario añadirá el logo aquí, dejamos el img preparado -->
            <img src="Images/Logos/LogoHexagonoAlia-SinFondo.png" alt="ALIA Logo" class="logo-img">
        </div>
        <a href="#" class="btn btn-primary">PROTOTIPO</a>
    </header>

    <!-- Hero Section -->
    <main class="hero">
        <!-- Text Content -->
        <div class="hero-content">
            <h1 class="hero-title">
                El asistente que <br>
                <span class="highlight">optimiza</span> tus <br>
                reservas.
            </h1>
            <p class="hero-description">
                Automatiza tus reservas, reduce los no-shows y ofrece una atención premium 24/7 sin levantar un dedo. El asistente digital que tu negocio merece.
            </p>
            <div class="hero-buttons">
                <a href="#" class="btn btn-primary">PROTOTIPO</a>
                <a href="#" class="btn btn-secondary">Solicitar Presupuesto<br>Personalizado</a>
            </div>
        </div>

        <!-- Phone Mockup Content -->
        <div class="hero-visual">
            <div class="phone-container">
                <div class="notch"></div>
                <div class="phone-screen">
                    <!-- Chat Header -->
                    <div class="chat-header">
                        <div class="chat-header-left">
                            <span class="icon-back">❮</span>
                            <div class="chat-avatar">
                                <img src="Images/Logos/LogoHexagonoAlia-SinFondo.png" alt="Avatar">
                            </div>
                            <div class="chat-info">
                                <h3 class="chat-name">Peluquería ALIA</h3>
                                <p class="chat-status">En línea</p>
                            </div>
                        </div>
                        <div class="chat-header-right">
                            <span class="icon-video">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                            </span>
                            <span class="icon-call">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            </span>
                        </div>
                    </div>
                    
                    <!-- Chat Body where JS injects messages -->
                    <div class="chat-body" id="chat-container">
                        <!-- Mensajes inyectados dinámicamente -->
                    </div>

                    <!-- Chat Footer -->
                    <div class="chat-footer">
                        <span class="icon-plus">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </span>
                        <div class="chat-input-wrapper">
                            <input type="text" placeholder="Escribe un mensaje..." disabled>
                        </div>
                        <div class="icon-send">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="white">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- App Logic (Modules) -->
    <script type="module" src="JS/Hero/init.js"></script>
</body>
</html>
